name: Build Java app

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Java 21 setup
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Run unit tests
        run: mvn test

  build:
    runs-on: ubuntu-latest
    needs: unit-test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Java 21 setup
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run maven build
        run: mvn clean package -DskipTests
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

      #    security-check:
      #      if: false
      # TODO: apply Sonar and trivy/snyk check here!

  docker-build-and-publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
    steps:
      - name: Checkout Dockerfile only
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            Dockerfile
          sparse-checkout-cone-mode: false
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/
      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/vbalassa/${{ github.event.repository.name }}:latest

  docker-deploy:
    runs-on: self-hosted
    needs: docker-build-and-publish
    steps:
      - name: Stop old container
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          docker stop ${{ github.event.repository.name }}:latest -ErrorAction SilentlyContinue
          docker rm ${{ github.event.repository.name }}:latest -ErrorAction SilentlyContinue
        shell: powershell

      - name: Run new container
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          docker run -d `
            --name ${{ github.event.repository.name }} `
            -p 8080:8080 `
            ghcr.io/vbalassa/${{ github.event.repository.name }}:latest
        shell: powershell